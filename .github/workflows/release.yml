name: Release

# Pushing a version tag (bare numbers, matching the repo's history: 0.2.3)
# creates a GitHub release with generated notes. SPM consumes the tag itself,
# so there is no artifact to build or attach.

on:
  push:
    tags: ["[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "FRadioPlayer $GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
